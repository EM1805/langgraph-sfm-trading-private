# Agent-oriented Discovery family mapping.
feature_families:
  workload: [context_load, ambiguity, latency, queue, backlog]
  memory: [memory, retrieval, cache]
  tooling: [tool_call, tool_retry, tool]
  governance: [approval, policy_override, guardrail, review]
  change_risk: [novel_action, blast_radius, rollback, environment_risk]
