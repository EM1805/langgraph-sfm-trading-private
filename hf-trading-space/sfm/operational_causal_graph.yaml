meta:
  name: amantia_action_risk_graph
  version: 0.3
  description: Operational causal graph for action-level danger veto with explicit treatment, confounder, mediator, collider, outcome, and policy node semantics.
defaults:
  observed: true
  intervenable: false
  adjustable: false
  allowed_as_adjustment: auto
  time_role: concurrent
  aliases: []
nodes:
- id: external_send
  type: action_effect
  aliases: [send_email_external, email_external, external_email]
  observed: true
  intervenable: false
  adjustable: false
  time_role: post_treatment
- id: external_share
  type: action_effect
  aliases: [share_file_external, share_external]
  observed: true
  intervenable: false
  adjustable: false
  time_role: post_treatment
- id: permission_change
  type: action_effect
  aliases: [change_permissions]
  observed: true
  time_role: post_treatment
- id: credential_rotation
  type: action_effect
  observed: true
  time_role: post_treatment
- id: destructive_write
  type: action_effect
  observed: true
  time_role: post_treatment
- id: delete_resource
  type: action_effect
  aliases: [delete_action]
  observed: true
  time_role: post_treatment
- id: configuration_change
  type: action_effect
  aliases: [deploy_config_change]
  observed: true
  time_role: post_treatment
- id: service_change
  type: action_effect
  aliases: [service_rollout]
  observed: true
  time_role: post_treatment
- id: bypass_control
  type: action_effect
  aliases: [bypass_approval]
  observed: true
  time_role: post_treatment
- id: suppress_review
  type: action_effect
  aliases: [skip_review]
  observed: true
  time_role: post_treatment

# --- path-level treatments for the 3 main veto paths ---
- id: recipient_scope
  type: treatment
  aliases: [recipient_externality, external_recipient_scope]
  observed: true
  intervenable: true
  adjustable: false
  time_role: baseline
- id: rollback_available
  type: treatment
  aliases: [recovery_available, rollback_ready]
  observed: true
  intervenable: true
  adjustable: false
  time_role: baseline
- id: novel_action
  type: treatment
  aliases: [change_novelty, novel_action_rate, novelty_rate, reduce_novel_actions]
  observed: true
  intervenable: true
  adjustable: false
  time_role: baseline

# --- shared confounders / context ---
- id: action_family
  type: confounder
  observed: true
  adjustable: true
  allowed_as_adjustment: true
  time_role: baseline
- id: environment
  type: confounder
  aliases: [execution_environment, environment_risk, execution_risk]
  observed: true
  adjustable: true
  allowed_as_adjustment: true
  time_role: baseline
- id: resource_sensitivity
  type: confounder
  aliases: [sensitivity, data_sensitivity]
  observed: true
  adjustable: true
  allowed_as_adjustment: true
  time_role: baseline
- id: approval_present
  type: confounder
  aliases: [human_approval, approval_status]
  observed: true
  adjustable: true
  allowed_as_adjustment: true
  time_role: baseline
- id: attachment_present
  type: confounder
  aliases: [has_attachment]
  observed: true
  adjustable: true
  allowed_as_adjustment: true
  time_role: baseline
- id: blast_radius
  type: confounder
  aliases: [change_scope, impact_scope, affected_scope]
  observed: true
  adjustable: true
  allowed_as_adjustment: true
  time_role: baseline
- id: service_criticality
  type: confounder
  observed: true
  adjustable: true
  allowed_as_adjustment: true
  time_role: baseline
- id: user_role
  type: confounder
  observed: true
  adjustable: true
  allowed_as_adjustment: true
  time_role: baseline

# --- mediators for leakage path ---
- id: disclosure_surface
  type: mediator
  observed: true
  adjustable: false
  allowed_as_adjustment: false
  time_role: post_treatment
- id: external_boundary_crossed
  type: mediator
  observed: true
  adjustable: false
  allowed_as_adjustment: false
  time_role: post_treatment
- id: sensitive_payload_exposed
  type: mediator
  observed: true
  adjustable: false
  allowed_as_adjustment: false
  time_role: post_treatment

# --- mediators for destructive mutation path ---
- id: capability_surface_change
  type: mediator
  observed: true
  adjustable: false
  allowed_as_adjustment: false
  time_role: post_treatment
- id: unauthorized_capability
  type: mediator
  observed: true
  adjustable: false
  allowed_as_adjustment: false
  time_role: post_treatment
- id: data_mutation
  type: mediator
  observed: true
  adjustable: false
  allowed_as_adjustment: false
  time_role: post_treatment
- id: rollback_failure
  type: mediator
  observed: true
  adjustable: false
  allowed_as_adjustment: false
  time_role: post_treatment
- id: recovery_gap
  type: mediator
  observed: true
  adjustable: false
  allowed_as_adjustment: false
  time_role: post_treatment

# --- mediators for operational failure path ---
- id: change_complexity
  type: mediator
  observed: true
  adjustable: false
  allowed_as_adjustment: false
  time_role: post_treatment
- id: service_instability
  type: mediator
  observed: true
  adjustable: false
  allowed_as_adjustment: false
  time_role: post_treatment
- id: rollback_delay
  type: mediator
  observed: true
  adjustable: false
  allowed_as_adjustment: false
  time_role: post_treatment

# --- governance / policy path ---
- id: governance_bypass
  type: mediator
  observed: true
  adjustable: false
  allowed_as_adjustment: false
  time_role: post_treatment

# --- colliders / detection-only nodes: useful to mark as forbidden for adjustment ---
- id: incident_investigated
  type: collider
  observed: true
  adjustable: false
  allowed_as_adjustment: false
  time_role: post_treatment
- id: alert_generated
  type: collider
  observed: true
  adjustable: false
  allowed_as_adjustment: false
  time_role: post_treatment
- id: manual_review_triggered
  type: collider
  observed: true
  adjustable: false
  allowed_as_adjustment: false
  time_role: post_treatment

# --- harms ---
- id: harm_leakage
  type: harm
  severity: critical
  aliases: [data_leakage, leakage, harm_event, target, incident, safety_incident]
- id: harm_unauthorized_access
  type: harm
  severity: high
  aliases: [unauthorized_access]
- id: harm_data_loss
  type: harm
  severity: critical
  aliases: [data_loss]
- id: harm_operational_failure
  type: harm
  severity: medium
  aliases: [operational_failure, outage]
- id: harm_policy_bypass
  type: harm
  severity: high
  aliases: [policy_bypass]

# --- aggregate discovery outcome bridge ---
# Keeps the runtime harm taxonomy compatible with the offline discovery DAG,
# whose canonical target is harm_event. Specific operational harms remain the
# preferred runtime outcomes; harm_event is the aggregate alias/outcome used by
# discovery, estimation, and graph-identification smoke checks.
- id: harm_event
  type: harm
  severity: high
  aliases: [target, incident, safety_incident, aggregate_harm]
  observed: true
  intervenable: false
  adjustable: false
  allowed_as_adjustment: false
  time_role: post_treatment

# --- negative controls / policy outputs kept separate from causal core ---
- id: cosmetic_metadata_change
  type: negative_control
  observed: true
  adjustable: false
  allowed_as_adjustment: false
  time_role: post_treatment
- id: dry_run_flag
  type: negative_control
  observed: true
  adjustable: false
  allowed_as_adjustment: false
  time_role: post_treatment
- id: policy_decision
  type: policy
  observed: true
  adjustable: false
  allowed_as_adjustment: false
  time_role: post_treatment

