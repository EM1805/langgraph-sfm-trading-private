- source: approval_present
  target: recipient_scope
  kind: governance
  confidence: medium
- source: attachment_present
  target: sensitive_payload_exposed
  kind: causal
  confidence: high
- source: recipient_scope
  target: external_send
  kind: causal
  confidence: high
- source: recipient_scope
  target: external_share
  kind: causal
  confidence: high
- source: resource_sensitivity
  target: sensitive_payload_exposed
  kind: causal
  confidence: high
- source: external_send
