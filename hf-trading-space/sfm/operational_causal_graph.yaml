path_hints:
  harm_event:
    path_id: aggregate_agent_harm
    treatment_node: novel_action
    contrast_key: novel_action
    treated_value: true
    control_value: false
    outcome_node: harm_event
    preferred_stratum_keys: [action_family, environment, approval_present, blast_radius]
    adjust_for: [action_family, environment, approval_present, blast_radius]
    avoid: [harm_leakage, harm_unauthorized_access, harm_data_loss, harm_operational_failure, harm_policy_bypass, alert_generated, manual_review_triggered, policy_decision]
    mediators: []
    colliders: [alert_generated, manual_review_triggered, incident_investigated]
    negative_controls: [dry_run_flag, cosmetic_metadata_change]
    alternative_explanations: [mixed_harm_taxonomy, confounding_via_environment, confounding_via_blast_radius]
    notes: Aggregate compatibility outcome for offline discovery target harm_event; prefer specific harm_* path hints for runtime veto decisions.
  harm_leakage:
    path_id: external_data_leakage
    treatment_node: recipient_scope
    contrast_key: recipient_scope
    treated_value: external
    control_value: internal
    outcome_node: harm_leakage
    preferred_stratum_keys: [action_family, environment, resource_sensitivity, approval_present, attachment_present]
    adjust_for: [action_family, environment, resource_sensitivity, approval_present, attachment_present]
    avoid: [external_send, external_share, disclosure_surface, external_boundary_crossed, sensitive_payload_exposed, alert_generated, manual_review_triggered, policy_decision]
    mediators: [external_send, external_share, disclosure_surface, external_boundary_crossed, sensitive_payload_exposed]
    colliders: [alert_generated, manual_review_triggered]
    negative_controls: [cosmetic_metadata_change, harm_operational_failure]
    alternative_explanations: [confounding_via_resource_sensitivity, confounding_via_attachment_present, confounding_via_environment]
    notes: Explicit mini-DAG for external leakage; do not adjust for disclosure or detection nodes.
  harm_data_loss:
    path_id: destructive_mutation
    treatment_node: rollback_available
    contrast_key: rollback_available
    treated_value: false
    control_value: true
    outcome_node: harm_data_loss
    preferred_stratum_keys: [action_family, environment, resource_sensitivity, approval_present, blast_radius]
    adjust_for: [action_family, environment, resource_sensitivity, approval_present, blast_radius]
    avoid: [delete_resource, destructive_write, data_mutation, recovery_gap, rollback_failure, incident_investigated, policy_decision]
    mediators: [data_mutation, recovery_gap, rollback_failure]
    colliders: [incident_investigated]
    negative_controls: [dry_run_flag, harm_policy_bypass]
    alternative_explanations: [confounding_via_blast_radius, confounding_via_resource_sensitivity, confounding_via_environment]
    notes: Explicit mini-DAG for destructive mutation with recoverability separated from mutation itself.
  harm_operational_failure:
    path_id: operational_failure
    treatment_node: novel_action
    contrast_key: novel_action
    treated_value: true
    control_value: false
    outcome_node: harm_operational_failure
    preferred_stratum_keys: [action_family, environment, approval_present, blast_radius, service_criticality]
    adjust_for: [action_family, environment, approval_present, blast_radius, service_criticality]
    avoid: [configuration_change, service_change, change_complexity, service_instability, rollback_delay, manual_review_triggered, policy_decision]
    mediators: [change_complexity, service_instability, rollback_delay]
    colliders: [manual_review_triggered]
    negative_controls: [dry_run_flag, harm_policy_bypass]
    alternative_explanations: [regime_shift_explanation, confounding_via_blast_radius, confounding_via_service_criticality]
    notes: Explicit mini-DAG for operational failure; novelty should be compared within similar service and scope strata.
  harm_policy_bypass:
    path_id: policy_bypass
    treatment_node: approval_present
    contrast_key: approval_present
    treated_value: false
    control_value: true
    outcome_node: harm_policy_bypass
    preferred_stratum_keys: [action_family, environment, user_role]
    adjust_for: [action_family, environment, user_role]
    avoid: [bypass_control, suppress_review, governance_bypass, manual_review_triggered, policy_decision]
    mediators: [governance_bypass]
    colliders: [manual_review_triggered]
    negative_controls: [dry_run_flag]
    alternative_explanations: [confounding_via_user_role]
